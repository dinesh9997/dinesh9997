name: Generate Languages Graph

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Create output folder
        run: mkdir -p dist

      - name: Download languages SVG
        run: |
          curl "https://github-readme-stats.vercel.app/api/top-langs/?username=dinesh9997&layout=compact&theme=tokyonight" -o dist/languages.svg

      - name: Push languages
        uses: crazy-max/ghaction-github-pages@v4
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

name: Generate GitHub Stats

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Create output folder
        run: mkdir -p dist

      - name: Download stats SVG
        run: |
          curl "https://github-readme-stats.vercel.app/api?username=dinesh9997&show_icons=true&theme=tokyonight" -o dist/stats.svg

      - name: Push stats
        uses: crazy-max/ghaction-github-pages@v4
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
